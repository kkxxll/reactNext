<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景圆 -->
  <circle cx="32" cy="32" r="32" fill="#FFF0F5"/>

  <!-- 左耳（外） -->
  <ellipse cx="22" cy="14" rx="5" ry="11" fill="#FFFFFF" stroke="#E8C5D1" stroke-width="0.8"/>
  <!-- 左耳（内） -->
  <ellipse cx="22" cy="15" rx="2.2" ry="7.5" fill="#FFB6C1"/>

  <!-- 右耳（外） -->
  <ellipse cx="42" cy="14" rx="5" ry="11" fill="#FFFFFF" stroke="#E8C5D1" stroke-width="0.8"/>
  <!-- 右耳（内） -->
  <ellipse cx="42" cy="15" rx="2.2" ry="7.5" fill="#FFB6C1"/>

  <!-- 脸 -->
  <circle cx="32" cy="36" r="20" fill="#FFFFFF" stroke="#E8C5D1" stroke-width="0.8"/>

  <!-- 腮红 -->
  <circle cx="20" cy="40" r="3.2" fill="#FFB3C1" opacity="0.75"/>
  <circle cx="44" cy="40" r="3.2" fill="#FFB3C1" opacity="0.75"/>

  <!-- 眼睛 -->
  <ellipse cx="25" cy="34" rx="2.4" ry="3.2" fill="#2C2C2C"/>
  <ellipse cx="39" cy="34" rx="2.4" ry="3.2" fill="#2C2C2C"/>
  <circle cx="25.8" cy="32.9" r="0.9" fill="#FFFFFF"/>
  <circle cx="39.8" cy="32.9" r="0.9" fill="#FFFFFF"/>

  <!-- 鼻子（小粉三角） -->
  <path d="M30.5 39.5 Q32 41.5 33.5 39.5 Q32 38.5 30.5 39.5 Z" fill="#FF8AA8"/>

  <!-- 三瓣嘴 -->
  <line x1="32" y1="40.8" x2="32" y2="43" stroke="#2C2C2C" stroke-width="1" stroke-linecap="round"/>
  <path d="M32 43 Q29.5 45.2 27.5 43.8" stroke="#2C2C2C" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <path d="M32 43 Q34.5 45.2 36.5 43.8" stroke="#2C2C2C" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- 两颗小门牙 -->
  <rect x="30.2" y="43.6" width="1.6" height="2.2" rx="0.4" fill="#FFFFFF" stroke="#E8C5D1" stroke-width="0.4"/>
  <rect x="32.2" y="43.6" width="1.6" height="2.2" rx="0.4" fill="#FFFFFF" stroke="#E8C5D1" stroke-width="0.4"/>
</svg>
